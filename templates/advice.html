<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI补货建议 - 快餐店管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 14px; background: #007bff; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn:disabled { background: #ccc; }
        .btn:active { background: #0056b3; }
        .advice-box { display: none; margin-top: 16px; padding: 16px; background: #e3f2fd; border-radius: 8px; white-space: pre-wrap; line-height: 1.6; }
        .advice-box.show { display: block; }
        .loading { display: none; text-align: center; padding: 20px; color: #666; }
        .loading.show { display: block; }
        .error { background: #ffebee; color: #c62828; padding: 12px; border-radius: 8px; margin-top: 12px; }
        .tip { font-size: 14px; color: #666; margin-bottom: 16px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav a { flex: 1; padding: 10px; text-align: center; background: #fff; border-radius: 8px; text-decoration: none; color: #666; font-size: 14px; }
        .nav a.active { background: #007bff; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI补货建议</h1>
        
        <div class="nav">
            <a href="/">记录</a>
            <a href="/history">历史</a>
            <a href="/advice" class="active">AI建议</a>
            <a href="/admin">管理</a>
        </div>
        
        <div class="card">
            <p class="tip">基于过去7天损耗数据，AI将分析趋势并给出明日备货建议</p>
            <button class="btn" id="getAdviceBtn" onclick="getAdvice()">获取AI建议</button>
            
            <div class="loading" id="loading">
                AI分析中，请稍候...
            </div>
            
            <div class="advice-box" id="adviceBox"></div>
        </div>
    </div>
    
    <script>
        async function getAdvice() {
            const btn = document.getElementById('getAdviceBtn');
            const loading = document.getElementById('loading');
            const adviceBox = document.getElementById('adviceBox');
            
            btn.disabled = true;
            loading.classList.add('show');
            adviceBox.classList.remove('show');
            
            try {
                const response = await fetch('/api/advice', { method: 'POST' });
                const data = await response.json();
                
                loading.classList.remove('show');
                
                if (data.success) {
                    adviceBox.textContent = data.advice;
                    adviceBox.classList.add('show');
                } else {
                    adviceBox.innerHTML = '<div class="error">' + data.error + '</div>';
                    adviceBox.classList.add('show');
                }
            } catch (err) {
                loading.classList.remove('show');
                adviceBox.innerHTML = '<div class="error">请求失败，请重试</div>';
                adviceBox.classList.add('show');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
